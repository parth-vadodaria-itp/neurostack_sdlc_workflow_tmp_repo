openapi: 3.0.0
info:
  title: Simple Welcome Web Application (KAN-124)
  description: A minimal Flask web application that displays a welcome message when accessing the home page.
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local development server
paths:
  /:
    get:
      summary: Welcome endpoint
      description: Returns a welcome message to the user
      operationId: getWelcome
      responses:
        '200':
          description: Welcome message
          content:
            text/plain:
              schema:
                type: string
                example: Hello Neurostack User
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Internal server error
